server {
    listen 443 ssl;
    server_name parthakadam.space www.parthakadam.space;

    ssl_certificate /etc/letsencrypt/live/parthakadam.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/parthakadam.space/privkey.pem;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods *;
            add_header Access-Control-Allow-Headers *;
            return 204;
        }

        proxy_pass http://api:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # IMPORTANT: forward headers back
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods *;
        add_header Access-Control-Allow-Headers *;
    }
}
